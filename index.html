<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Riverdale: Sinister Secrets</title>
    <style>
        /* CSS EMBUTIDO PARA NÃO TER ERRO DE CARREGAMENTO */
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #setup-container { text-align: center; padding-top: 100px; }
        
        /* Container que divide a tela em Jogo (Esquerda) e Chat (Direita) */
        #game-screen { display: none; width: 100vw; height: 100vh; }
        .riverdale-wrapper { display: flex; width: 100%; height: 100%; }

        /* Lado Esquerdo - Jogo */
        .main-game { flex: 7; padding: 20px; overflow-y: auto; border-right: 3px solid #333; background: radial-gradient(circle, #1a0202 0%, #000 100%); }
        
        /* Lado Direito - Chat Lateral */
        .sidebar-chat { 
            flex: 3; 
            background: #0a0a0a; 
            display: flex; 
            flex-direction: column; 
            padding: 15px; 
            min-width: 300px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }

        #chat-messages { flex: 1; overflow-y: auto; background: #000; border: 1px solid #222; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        #chat-messages div { margin-bottom: 8px; font-size: 14px; border-bottom: 1px solid #111; padding-bottom: 5px; }
        .chat-input-area { display: flex; gap: 5px; }
        .chat-input-area input { flex: 1; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 4px; }
        .chat-input-area button { background: #ff0000; color: #fff; border: none; padding: 10px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; }

        /* Elementos do Jogo */
        #players-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; }
        .card-player { width: 150px; background: #111; border: 1px solid #333; padding: 10px; border-radius: 8px; text-align: center; }
        .card-player.active { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
        .char-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #444; }
        
        .btn-riverdale { background: transparent; border: 2px solid #ff0000; color: #fff; padding: 15px 30px; cursor: pointer; font-weight: bold; margin: 10px; border-radius: 5px; text-transform: uppercase; }
        .btn-riverdale:hover { background: #ff0000; }
        
        #status-bar { background: #222; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; font-size: 18px; border-left: 5px solid #ff0000; }
        .secret-box { background: #300; padding: 10px; margin-top: 10px; font-size: 12px; border: 1px dashed #f00; color: #ff9999; }
    </style>
</head>
<body>

    <!-- TELA INICIAL -->
    <div id="setup-container">
        <h1 style="color:red; font-size: 60px; letter-spacing: 10px;">RIVERDALE</h1>
        <p>MISTÉRIO: QUEM MATOU JASON BLOSSOM?</p>
        <button class="btn-riverdale" onclick="joinGame()">ENTRAR NA SÉRIE</button>
        <button class="btn-riverdale" style="border-color:#444; color:#444;" onclick="resetGame()">RESETAR SERVIDOR</button>
    </div>

    <!-- TELA DO JOGO (JOGO + CHAT) -->
    <div id="game-screen">
        <div class="riverdale-wrapper">
            
            <main class="main-game">
                <div id="status-bar">
                    <span id="round-display">Rodada 1/7</span> | 
                    <span id="liar-alert">Aguardando...</span>
                </div>

                <div id="players-list">
                    <!-- Personagens aparecem aqui -->
                </div>
                
                <div id="action-zone" style="margin-top: 30px; text-align: center;">
                    <p id="instruction-msg" style="color: #aaa;">Para avançar, todos devem enviar uma mensagem no chat.</p>
                    <button id="next-round-btn" class="btn-riverdale" style="display:none;" onclick="nextRound()">PRÓXIMA RODADA ➔</button>
                </div>
            </main>

            <aside class="sidebar-chat">
                <h2 style="color: red; font-size: 18px;">INVESTIGAÇÃO AO VIVO</h2>
                <div id="chat-messages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Digite uma pista...">
                    <button onclick="sendMessage()">ENVIAR</button>
                </div>
                <div id="chat-status" style="margin-top: 10px; font-size: 12px; color: #888;">
                    Faltam falar: <span id="waiting-on" style="color: #ff0000;">...</span>
                </div>
            </aside>

        </div>
    </div>

    <!-- TELA FINAL -->
    <div id="final-screen" style="display:none; text-align: center; padding-top: 100px;">
        <h1 id="winner-announcement" style="font-size: 50px;"></h1>
        <div id="vote-section">
            <h2>QUEM É O CULPADO?</h2>
            <div id="vote-buttons"></div>
        </div>
        <div id="results-area" style="display:none;">
            <div id="winners-circle"></div>
            <button class="btn-riverdale" onclick="location.reload()">JOGAR NOVAMENTE</button>
        </div>
    </div>

    <script src="engine.js"></script>
</body>
</html>
