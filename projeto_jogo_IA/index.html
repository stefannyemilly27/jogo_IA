<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Riverdale: Sinister Secrets</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="riverdale-container">
    <header>
        <h1>RIVERDALE</h1>
        <p style="text-align:center; letter-spacing: 5px;">QUEM MATOU JASON BLOSSOM?</p>
    </header>

    <div id="game-setup" class="text-center">
        <button class="btn-riverdale" onclick="joinGame()">Entrar na Série</button>
    </div>

    <div id="game-board" style="display:none; width: 100%;">
        <div id="status-bar" style="margin-bottom: 30px; border-bottom: 1px solid #444; padding: 10px;">
            <span id="round-display">Rodada 1/7</span> | 
            <span id="liar-hint" style="color: #ff0000;"></span>
        </div>

        <div id="players-list" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));">
            <!-- Jogadores via JS -->
        </div>

        <div id="interaction-zone" style="margin-top: 40px; text-align: center;">
            <h3 id="turn-instruction">Aguardando sua vez de perguntar...</h3>
            <div id="vote-section" style="display:none;">
                <h2 style="color:yellow">VOTAÇÃO FINAL: QUEM É O CULPADO?</h2>
                <div id="vote-buttons"></div>
            </div>
        </div>
    </div>

    <div id="final-screen" style="display:none; text-align: center;">
        <h1 id="winner-announcement"></h1>
        <div id="winners-circle" style="display:flex; justify-content: center; gap: 20px; flex-wrap: wrap;"></div>
        <div id="secret-reveal" style="margin-top: 50px; background: #111; padding: 20px;"></div>
    </div>
</div>

<script src="engine.js"></script>
</body>
</html>
